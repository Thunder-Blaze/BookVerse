<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Book List</h2>
    <button class="btn btn-primary" (click)="addNewBook()">Add New Book</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>Description</th>
          <th>Availability</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let book of books">
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.genre }}</td>
          <td>{{ book.description }}</td>
          <td>
            <span [class]="book.available ? 'badge bg-success' : 'badge bg-danger'">
              {{ book.available ? 'Available' : 'Unavailable' }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-primary me-2" (click)="editBook(book.id!)">
              Edit
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteBook(book.id!)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
