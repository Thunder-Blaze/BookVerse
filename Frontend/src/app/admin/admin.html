<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="topbar">
    <img src="/icon.png" alt="Website logo">
    <input type="text" id="Search" placeholder="🔍 Search books...">
    <div class="user-circle">
      <i class="fas fa-user"></i>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <a href="#">Return</a>
      <a href="#">Search</a>
    </div>

    <!-- Right Content Area -->
    <div class="main-content">

      <!-- Dashboard Header ABOVE content -->
      <div class="dashboard-header">
        <h1 id="welcome">Welcome Admin</h1>
        <div>
          <span style="margin-right: 10px; font-weight: 500;">Quick Actions:</span>
          <button class="add-button">Add New Book</button>
        </div>
      </div>

      <!-- Dashboard Cards -->
      <div class="card-container">
        <div class="card yellow">
          <div class="card-icon"><i class="fas fa-book"></i></div>
          <div class="label">Total Books</div>
          <div class="value">2000</div>
          <button>View Details</button>
        </div>
        <div class="card blue">
          <div class="card-icon"><i class="fas fa-book-open"></i></div>
          <div class="label">Lended Books</div>
          <div class="value">500</div>
          <button>View Details</button>
        </div>
        <div class="card teal">
          <div class="card-icon"><i class="fas fa-book-reader"></i></div>
          <div class="label">Available Books</div>
          <div class="value">800</div>
          <button>View Details</button>
        </div>
        <div class="card green">
          <div class="card-icon"><i class="fas fa-users"></i></div>
          <div class="label">Total Users</div>
          <div class="value">500</div>
          <button>View Details</button>
        </div>
        <div class="card pink">
          <div class="card-icon"><i class="fas fa-exclamation-circle"></i></div>
          <div class="label">Overdue Books</div>
          <div class="value">300</div>
          <button>View Details</button>
        </div>
      </div>

    </div> <!-- /.main-content -->

  </div> <!-- /.main-layout -->

</body>
</html>
