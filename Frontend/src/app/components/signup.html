<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | BookVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="signup.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="light-theme">
  <button id="theme-toggle" class="theme-button"><i class="fas fa-moon"></i></button>

  <div class="container">
    <div class="left-panel">
      <img src="clogo.png" alt="BookVerse Logo" class="logo"/>
      <!-- <h1 id="BookVerse">Join BookVerse</h1>
      <p id="BookVerse">The Universe of Books is waiting for you!</p> -->
    </div>

    <div class="right-panel">
      <form class="signup-form">
        <h2>Create Account</h2>

        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Your Name" required/>
        </div>

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" required/>
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" required/>
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Confirm Password" required/>
        </div>

        <button type="submit" class="submit-btn">Sign Up</button>

        <p class="login-link">Already have an account? <a href="#">Log in</a></p>

        <div class="social-login">
          <p>Or sign up with</p>
          <div class="social-icons">
            <img src="https://static.vecteezy.com/system/resources/previews/016/716/447/non_2x/facebook-icon-free-png.png" alt="Facebook"/>
            <img src="https://static.vecteezy.com/system/resources/previews/016/716/467/non_2x/twitter-icon-free-png.png" alt="Twitter"/>
            <img src="google.png" alt="Google"/>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark-theme');
      body.classList.toggle('light-theme');
      toggle.innerHTML = body.classList.contains('dark-theme') 
        ? '<i class="fas fa-sun"></i>' 
        : '<i class="fas fa-moon"></i>';
    });
  </script>
</body>
</html>
