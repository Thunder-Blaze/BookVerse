<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookVerse Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="DashBoard.css">
</head>
<body class="light-theme">
    <header>
        <div class="logo"><img src="FullLogo.png" alt="BookVerse Logo"></div>
        <div class="search-bar">
          <input type="text" id="mainSearch" placeholder="🔍 Search books..."/>
        </div>
        <div class="profile">
          <i class="fas fa-user-circle"></i>
          <span>uname</span>
          <i id="themeIcon" class="fas fa-moon theme-toggle" onclick="toggleTheme()"> </i>
        </div>
      </header>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="filters">
        <input type="text" id="genreFilter" placeholder="🔍 Search by Genre"/>
        <input type="text" id="authorFilter" placeholder="🔍 Search by Author"/>
      </div>
      
      <button onclick="viewCart()">🛒 View Cart</button>
    </aside>

    <main class="content">
        <h1 id="Welcome">Welcome to BookVerse</h1>
        <div class="stats-container">
            <div class="stat-card issue">
              <h3>📚 Issue Books</h3>
              <p class="count">1,245</p>
            </div>
          
            <div class="stat-card return">
              <h3>🔁 Return Books</h3>
              <p class="count">980</p>
            </div>
          
            <div class="stat-card due">
              <h3>⏰ Due Books</h3>
              <p class="count">312</p>
            </div>
          </div>
          
      <table id="bookTable">
        <thead>
          <tr>
            <th>📚 Serial No.</th>
            <th>📖 Name</th>
            <th>👤 Issued Date</th>
            <th>📅 Return By</th>
            <th>💸 Fine</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </main>
  </div>

  <script src="DashBoard.js"></script>
</body>
</html>
